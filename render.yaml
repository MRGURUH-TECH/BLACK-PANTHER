databases:
  - name: ultra-guru-db
    plan: free
    databaseName: ultra_guru
    user: guru_tech

services:
  - type: web
    name: ultra-guru-md
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SESSION_ID
        sync: false
        description: "Your WhatsApp session ID (get from QR scan)"
      - key: BOT_NAME
        value: "BLACK PANTHER"
      - key: OWNER_NAME
        value: "GURUTECH 😎"
      - key: MODE
        value: public
      - key: TIME_ZONE
        value: Africa/Nairobi
      - key: AUTO_LIKE_STATUS
        value: "true"
      - key: AUTO_READ_STATUS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ultra-guru-db
          property: connectionString
      - key: NODE_VERSION
        value: "18.20.8"
